<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ трансфера</title>
    <style>
        /* Общие стили */
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        h2 { text-align: center; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }

        /* Сетка для мобильных */
        .fleet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .car-card { border: 1px solid #ddd; padding: 8px; border-radius: 8px; text-align: center; font-size: 12px; }
        .car-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; display: block; margin-bottom: 5px; }

        /* Кнопки */
        button { width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold; }
        .btn-calc { background: #28a745; color: white; }
        .btn-wa { background: #0088cc; color: white; display: none; }
        
        #totalPrice { font-weight: bold; font-size: 1.5em; margin: 15px 0; text-align: center; color: #333; }

        /* Адаптивность для очень узких экранов */
        @media (max-width: 400px) {
            .fleet-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Book a Transfer / Заказ трансфера</h2>

    <div class="form-group"><label>First Name and Last Name/Имя и Фамилия:</label><input type="text" id="clientName" placeholder="Ivan ANTIPOV"></div>
    <div class="form-group"><label>Phone number/Номер телефона:</label><input type="tel" id="clientPhone" placeholder="+33..."></div>
    <div class="form-group"><label>From Where /Откуда:</label><input type="text" id="pickup"></div>
    <div class="form-group"><label>To Where /Куда:</label><input type="text" id="dropoff"></div>
    <div class="form-group"><label>Mileage (km)/Километраж (км):</label><input type="number" id="distance"></div>
    <div class="form-group"><label>Кол-во пассажиров:</label><input type="number" id="passengers"></div>
    <div class="form-group"><label>Waiting (hours)/Ожидание (часы):</label><input type="number" id="waiting" value="0"></div>

    <label>Vehicle Class /Класс автомобиля:</label>
    <div class="fleet-grid">
        <div class="car-card">
            <img src="economy.jpeg" alt="Economy">
            <div>Economy (4 pass./4 пас.)</div>
            <input type="radio" name="carClass" value="2.0" data-name="Economy" checked>
        </div>
        <div class="car-card">
            <img src="Берлин Мэрс.jpeg" alt="Berlin">
            <div>Berlin (4 pass./4 пас.)</div>
            <input type="radio" name="carClass" value="2.5" data-name="Berlin (4 пас.)">
        </div>
        <div class="car-card">
            <img src="Берлин Фиат.jpeg" alt="Berlin">
            <div>Berlin (8 pass./8 пас.)</div>
            <input type="radio" name="carClass" value="2.5" data-name="Berlin (8 пас.)">
        </div>
        <div class="car-card">
            <img src="В класс Мэрс.jpeg" alt="V-class">
            <div>V-class (6-7 pass./6-7 пас.)</div>
            <input type="radio" name="carClass" value="3.5" data-name="V-class">
        </div>
    </div>

    <button class="btn-calc" onclick="calculate()">Calculate the cost /Рассчитать стоимость</button>
    <div id="totalPrice">Итого: 0 €</div>
    <button id="whatsappBtn" class="btn-wa" onclick="sendWhatsApp()">Order via WhatsApp /Заказать в WhatsApp</button>
</div>

<script>
    function calculate() {
        const dist = parseFloat(document.getElementById('distance').value) || 0;
        const wait = parseFloat(document.getElementById('waiting').value) || 0;
        const car = document.querySelector('input[name="carClass"]:checked');
        const rate = parseFloat(car.value);
        const total = (dist * rate) + (wait * 30);
        document.getElementById('totalPrice').innerText = "Итого: " + total.toFixed(2) + " €";
        document.getElementById('whatsappBtn').style.display = "block";
    }

    function sendWhatsApp() {
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        const pickup = document.getElementById('pickup').value;
        const dropoff = document.getElementById('dropoff').value;
        const dist = document.getElementById('distance').value;
        const pax = document.getElementById('passengers').value;
        const wait = document.getElementById('waiting').value;
        const total = document.getElementById('totalPrice').innerText;
        const carName = document.querySelector('input[name="carClass"]:checked').getAttribute('data-name');
        
        const message = `Новый заказ от ${name}:%0AТелефон: ${phone}%0AОткуда: ${pickup}%0AКуда: ${dropoff}%0AКм: ${dist}%0AМашина: ${carName}%0AПассажиры: ${pax}%0AОжидание: ${wait} ч%0A${total}`;
        window.open(`https://wa.me/33656853423?text=${message}`, '_blank');
    }
</script>

</body>
</html>
